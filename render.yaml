# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo.
# Secret values are NOT in this file — set them in the dashboard (Environment tab).
services:
  - type: web
    name: journeyai-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AEROAPI_KEY
        sync: false
      # PORT is provided by Render automatically — do not set it.
